<!-- inherits base.html -->
{% extends "base.html" %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index/style.css') }}">
{% endblock %}
{% block title %}ProPeople - Home{% endblock %}
{% block content %}
    <main>  
        <form class="center-container" method="post">
            <h1 class="logo_name">Pro<span>People</span></h1>
            <div class="form_container">
                <label class="form-label" for="email">Email</label>
                <input type="text" id="email" name="email" class="email" required>
            </div>
            <div class="form_container">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </main>  
{% endblock %}
